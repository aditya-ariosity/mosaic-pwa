<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mosaic — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09080C;
      color: #9C8E7A;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }
    svg { width: 72px; height: 72px; opacity: 0.7; }
    h1 { color: #EDB84A; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    p  { font-size: 16px; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 8px;
      background: #EDB84A;
      color: #09080C;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="10" fill="#EDB84A"/>
    <g stroke="#EDB84A" stroke-width="5" stroke-linecap="round" fill="none">
      <line x1="50" y1="50" x2="50"  y2="15"/>
      <line x1="50" y1="50" x2="50"  y2="85"/>
      <line x1="50" y1="50" x2="80"  y2="32"/>
      <line x1="50" y1="50" x2="20"  y2="68"/>
      <line x1="50" y1="50" x2="80"  y2="68"/>
      <line x1="50" y1="50" x2="20"  y2="32"/>
    </g>
  </svg>
  <h1>You're offline</h1>
  <p>Mosaic needs a connection to load. Connect to Wi‑Fi or mobile data and try again.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
